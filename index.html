<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SelAmBy.com</title>
  <link href="style.css" rel="stylesheet">

</head>
<body>  
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">🛒 <span>MarketRoom</span></div>
    <p class="auth-tagline">Buy & sell anything, instantly.</p>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Log In</button>
        <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>
      <!-- LOGIN -->
      <div class="auth-panel active" id="loginPanel">
        <div class="fg"><label>Username</label><input type="text" id="loginUser" placeholder="your username"></div>
        <div class="fg"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
        <button class="btn-primary" onclick="doLogin()">Enter MarketRoom →</button>
        <div class="flash" id="loginMsg"></div>
      </div>
      <!-- SIGNUP -->
      <div class="auth-panel" id="signupPanel">
        <div class="fg"><label>Full Name</label><input type="text" id="signupName" placeholder="e.g. Rapha Okafor"></div>
        <div class="fg"><label>Username</label><input type="text" id="signupUser" placeholder="rapha123"></div>
        <div class="fg"><label>Password</label><input type="password" id="signupPass" placeholder="min. 4 characters"></div>
        <button class="btn-primary" onclick="doSignup()">Create Account →</button>
        <div class="flash" id="signupMsg"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP SHELL ══ -->
<nav class="top-nav" id="appNav" style="display:none">
  <div class="logo">🛒 <span>SelAmBy</span></div>                                                                                                                                                                                                                                                                                                                                                                                                     
  <div class="top-nav-right">
    <div id="navAvatar">?</div>
  </div>
</nav>

<div class="screens" id="appScreens" style="display:none">

  <!-- ── HOME ── -->
  <div class="screen active" id="homeScreen">
    <div class="home-hero">
      <h2>Hey, <span class="greeting-name" id="greetName">there</span> 👋</h2>
      <p>What are you buying or selling today?</p>
    </div>
    <div class="stats-row">
      <div class="stat-pill"><h3 id="hsTotal">0</h3><p>Listings</p></div>
      <div class="stat-pill"><h3 id="hsSold">0</h3><p>Sold</p></div>
      <div class="stat-pill"><h3 id="hsBought">0</h3><p>Bought</p></div>
    </div>
    <div class="feed-header">
      <h3>All Products</h3>
      <div class="feed-filter">
        <button class="ff-btn active" onclick="setHomeFilter('all',this)">All</button>
        <button class="ff-btn" onclick="setHomeFilter('available',this)">Available</button>
        <button class="ff-btn" onclick="setHomeFilter('mine',this)">Mine</button>
      </div>
    </div>
    <div class="feed" id="homeFeed"></div>
  </div>

  <!-- ── EXPLORE ── -->
  <div class="screen" id="exploreScreen">
    <div class="explore-tabs">
      <button class="exp-tab active" onclick="setExpTab('post',this)">📦 Post G   oods</button>
      <button class="exp-tab" onclick="setExpTab('chat',this)">💬 Chat</button>
    </div>

    <!-- POST GOODS -->
    <div id="expPost" class="post-form-wrap">
      <div class="img-preview-wrap">
        <img id="imgPreview" alt="preview">
        <label class="file-label" for="fileInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Tap to choose image
        </label>
        <input type="file" id="fileInput" accept="image/*" onchange="previewImg(this)">
      </div>
      <div class="fg"><label>Product Name</label><input type="text" id="eName" placeholder="e.g. Nike Air Max 90"></div>
      <div class="fg"><label>Description</label><textarea id="eDesc" rows="3" placeholder="Describe your item..."></textarea></div>
      <div class="fg"><label>Price (₦)</label><input type="number" id="ePrice" placeholder="e.g. 45000" min="0"></div>
      <button class="btn-primary" onclick="explorePost()">Post Product →</button>
      <div class="flash" id="exploreMsg"></div>
    </div>

    <!-- CHAT -->
    <div id="expChat" style="display:none">
      <div class="chat-list">
        <label>Chat with a seller / buyer</label>
        <select id="chatUserSelect" onchange="loadChat()">
          <option value="">— Select a user —</option>
        </select>
      </div>
      <div id="chatArea">
        <div class="no-chat">Select a user above to start chatting</div>
      </div>
    </div>
  </div>

  <!-- ── YOU ── -->
  <div class="screen" id="youScreen">
    <div class="profile-hero">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-username" id="profileUsername">@—</div>
      <div class="profile-joined" id="profileJoined"></div>
    </div>
    <div class="profile-stats">
      <div class="pstat"><h3 id="psPosted">0</h3><p>Posted</p></div>
      <div class="pstat"><h3 id="psSold">0</h3><p>Sold</p></div>
      <div class="pstat"><h3 id="psBought">0</h3><p>Bought</p></div>
    </div>
    <div class="profile-section">
      <div class="profile-section-title">Recent Activity</div>
      <div id="activityList"></div>
      <div class="profile-section-title" style="margin-top:28px">Account</div>
      <button class="btn-logout-full" onclick="doLogout()">Log Out</button>
    </div>
  </div>

</div>

<!-- ══ BOTTOM TABS ══ -->
<div class="bottom-tabs" id="appTabs" style="display:none">
  <button class="tab-btn active" onclick="showScreen('home',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button class="tab-btn" onclick="showScreen('explore',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Explore</span>
  </button>
  <button class="tab-btn" onclick="showScreen('you',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>You</span>
  </button>
</div>

<script src="app.js">

</script>
</body>
</html>
